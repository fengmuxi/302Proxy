version: '3.8'

services:
  302-proxy:
    image: registry.cn-hangzhou.aliyuncs.com/fengmuxi-docker-images/302_proxy:latest
    container_name: 302-proxy
    restart: unless-stopped
    ports:
      - "18686:18686"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./log:/app/log
      - ./cache:/app/cache
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
